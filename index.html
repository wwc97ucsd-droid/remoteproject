<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4efe6;
      color: #4b4036;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      user-select: none;
    }

    .game {
      width: min(92vw, 520px);
      padding: 24px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: #776e65;
      font-size: clamp(48px, 12vw, 76px);
      line-height: 0.9;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score-box {
      min-width: 78px;
      padding: 9px 10px;
      border-radius: 6px;
      background: #bbada0;
      color: white;
      text-align: center;
      font-weight: 700;
    }

    .score-box span {
      display: block;
      color: #eee4da;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .score-box strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .hint {
      margin: 0;
      color: #776e65;
      font-size: 15px;
      line-height: 1.5;
    }

    button {
      flex: 0 0 auto;
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      background: #8f7a66;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #7c6856;
    }

    .board-wrap {
      position: relative;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      aspect-ratio: 1;
      padding: 12px;
      border-radius: 8px;
      background: #bbada0;
      touch-action: none;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: rgba(238, 228, 218, 0.35);
      color: #776e65;
      font-size: clamp(28px, 8vw, 54px);
      font-weight: 800;
      line-height: 1;
      transition: transform 120ms ease, background 120ms ease, color 120ms ease;
    }

    .cell.new {
      animation: pop 160ms ease-out;
    }

    .cell.merge {
      animation: pulse 180ms ease-out;
    }

    .v2 { background: #eee4da; }
    .v4 { background: #ede0c8; }
    .v8 { background: #f2b179; color: #f9f6f2; }
    .v16 { background: #f59563; color: #f9f6f2; }
    .v32 { background: #f67c5f; color: #f9f6f2; }
    .v64 { background: #f65e3b; color: #f9f6f2; }
    .v128 { background: #edcf72; color: #f9f6f2; font-size: clamp(24px, 7vw, 46px); }
    .v256 { background: #edcc61; color: #f9f6f2; font-size: clamp(24px, 7vw, 46px); }
    .v512 { background: #edc850; color: #f9f6f2; font-size: clamp(24px, 7vw, 46px); }
    .v1024 { background: #edc53f; color: #f9f6f2; font-size: clamp(20px, 6vw, 40px); }
    .v2048 { background: #edc22e; color: #f9f6f2; font-size: clamp(20px, 6vw, 40px); }
    .v4096, .v8192 { background: #3c3a32; color: #f9f6f2; font-size: clamp(20px, 6vw, 40px); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(238, 228, 218, 0.78);
      text-align: center;
    }

    .overlay.show {
      display: flex;
    }

    .message {
      padding: 20px;
    }

    .message h2 {
      margin: 0 0 16px;
      color: #776e65;
      font-size: clamp(32px, 9vw, 56px);
    }

    @keyframes pop {
      0% { transform: scale(0.5); }
      100% { transform: scale(1); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @media (max-width: 480px) {
      .game {
        padding: 16px;
      }

      .top,
      .controls {
        align-items: flex-start;
        flex-direction: column;
      }

      .scores {
        width: 100%;
      }

      .score-box {
        flex: 1;
      }

      button {
        width: 100%;
      }

      .board {
        gap: 9px;
        padding: 9px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="top" aria-label="游戏状态">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <span>分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-box">
          <span>最佳</span>
          <strong id="best">0</strong>
        </div>
      </div>
    </section>

    <section class="controls">
      <p class="hint">使用方向键或滑动移动方块，合并相同数字。</p>
      <button id="restart" type="button">重新开始</button>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="2048 棋盘"></div>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="message">游戏结束</h2>
          <button id="retry" type="button">再来一局</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const size = 4;
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlayEl = document.getElementById("overlay");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restart");
    const retryBtn = document.getElementById("retry");

    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem("best2048") || 0);
    let lastSpawn = null;
    let mergedCells = [];
    let hasWon = false;
    let locked = false;
    let touchStart = null;

    function createEmptyBoard() {
      return Array.from({ length: size }, () => Array(size).fill(0));
    }

    function startGame() {
      board = createEmptyBoard();
      score = 0;
      lastSpawn = null;
      mergedCells = [];
      hasWon = false;
      locked = false;
      overlayEl.classList.remove("show");
      addRandomTile();
      addRandomTile();
      render();
    }

    function addRandomTile() {
      const empty = [];

      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          if (board[row][col] === 0) {
            empty.push({ row, col });
          }
        }
      }

      if (!empty.length) return false;

      const spot = empty[Math.floor(Math.random() * empty.length)];
      board[spot.row][spot.col] = Math.random() < 0.9 ? 2 : 4;
      lastSpawn = `${spot.row}-${spot.col}`;
      return true;
    }

    function render() {
      boardEl.innerHTML = "";
      scoreEl.textContent = score;
      bestEl.textContent = best;

      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const value = board[row][col];
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.row = row;
          cell.dataset.col = col;

          if (value) {
            cell.textContent = value;
            cell.classList.add(`v${Math.min(value, 8192)}`);
          }

          if (`${row}-${col}` === lastSpawn) {
            cell.classList.add("new");
          }

          if (mergedCells.includes(`${row}-${col}`)) {
            cell.classList.add("merge");
          }

          boardEl.appendChild(cell);
        }
      }

      mergedCells = [];
    }

    function slideLine(line, lineIndex, direction) {
      const filtered = line.filter(Boolean);
      const result = [];
      let movedScore = 0;
      let cursor = 0;

      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] === filtered[i + 1]) {
          const value = filtered[i] * 2;
          result.push(value);
          movedScore += value;
          markMergedCell(lineIndex, cursor, direction);
          i++;
        } else {
          result.push(filtered[i]);
        }
        cursor++;
      }

      while (result.length < size) {
        result.push(0);
      }

      return { line: result, movedScore };
    }

    function markMergedCell(lineIndex, cursor, direction) {
      let row = lineIndex;
      let col = cursor;

      if (direction === "right") col = size - 1 - cursor;
      if (direction === "up") {
        row = cursor;
        col = lineIndex;
      }
      if (direction === "down") {
        row = size - 1 - cursor;
        col = lineIndex;
      }

      mergedCells.push(`${row}-${col}`);
    }

    function move(direction) {
      if (locked) return;

      const previous = JSON.stringify(board);
      let gained = 0;

      if (direction === "left" || direction === "right") {
        board = board.map((row, index) => {
          const source = direction === "right" ? [...row].reverse() : [...row];
          const moved = slideLine(source, index, direction);
          gained += moved.movedScore;
          return direction === "right" ? moved.line.reverse() : moved.line;
        });
      } else {
        for (let col = 0; col < size; col++) {
          const column = [];
          for (let row = 0; row < size; row++) {
            column.push(board[row][col]);
          }

          const source = direction === "down" ? column.reverse() : column;
          const moved = slideLine(source, col, direction);
          gained += moved.movedScore;
          const nextColumn = direction === "down" ? moved.line.reverse() : moved.line;

          for (let row = 0; row < size; row++) {
            board[row][col] = nextColumn[row];
          }
        }
      }

      if (JSON.stringify(board) === previous) {
        mergedCells = [];
        return;
      }

      score += gained;
      if (score > best) {
        best = score;
        localStorage.setItem("best2048", String(best));
      }

      addRandomTile();
      render();
      checkGameState();
    }

    function checkGameState() {
      if (!hasWon && board.flat().includes(2048)) {
        hasWon = true;
        showOverlay("你赢了！");
        return;
      }

      if (hasMoves()) return;
      showOverlay("游戏结束");
    }

    function hasMoves() {
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const value = board[row][col];
          if (value === 0) return true;
          if (row < size - 1 && board[row + 1][col] === value) return true;
          if (col < size - 1 && board[row][col + 1] === value) return true;
        }
      }
      return false;
    }

    function showOverlay(text) {
      locked = true;
      messageEl.textContent = text;
      overlayEl.classList.add("show");
    }

    function directionFromKey(key) {
      return {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right"
      }[key];
    }

    document.addEventListener("keydown", (event) => {
      const direction = directionFromKey(event.key);
      if (!direction) return;
      event.preventDefault();
      move(direction);
    });

    boardEl.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
    }, { passive: true });

    boardEl.addEventListener("touchend", (event) => {
      if (!touchStart) return;

      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      touchStart = null;
      if (Math.max(absX, absY) < 30) return;

      move(absX > absY ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up"));
    }, { passive: true });

    restartBtn.addEventListener("click", startGame);
    retryBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
